<body>

  <h1>Comprar plan</h1>

    <option value="Basico">Básico - S/10</option>

  </select>

  <input type="text" id="nombre" placeholder="Tu nombre"><br><br>
  <input type="email" id="email" placeholder="Tu correo"><br><br>

  <p>Yapear al: <strong>942004734</strong></p>

  <input type="file" id="comprobante"><br><br>

  <button onclick="enviar()">Enviar comprobante</button>

  <script>
    async function enviar() {
      const formData = new FormData();
      formData.append("nombre", document.getElementById("nombre").value);
      formData.append("email", document.getElementById("email").value);
      formData.append("plan", document.getElementById("plan").value);
      formData.append("comprobante", document.getElementById("comprobante").files[0]);

      await fetch("http://localhost:3000/compra", {
        method: "POST",
        body: formData
      });

      alert("Pedido enviado. Espera confirmación.");
    }
  </script>
