<!DOCTYPE html>
<html>
<head>
  <title>Panel Admin</title>
  <style>
    body { font-family: Arial; background: #111; color: #fff; }
    .card {
      background: #1e1e1e;
      padding: 15px;
      margin: 10px;
      border-radius: 10px;
    }
    button {
      padding: 8px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    .confirmar { background: green; color: white; }
    .pendiente { color: orange; }
    .activo { color: lightgreen; }
    .vencido { color: red; }
    img { max-width: 200px; display: block; margin-top: 10px; }
  </style>
</head>
<body>

<h1>Panel de Pedidos</h1>

<div id="pedidos"></div>

<script>
async function cargarPedidos() {
  const res = await fetch("http://localhost:3000/pedidos");
  const data = await res.json();

  const contenedor = document.getElementById("pedidos");
  contenedor.innerHTML = "";

  data.forEach(p => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h3>${p.nombre} (${p.plan})</h3>
      <p>Correo: ${p.email}</p>
      <p class="${p.estado}">Estado: ${p.estado}</p>
      <p>Inicio: ${p.fechaInicio || "-"}</p>
      <p>Fin: ${p.fechaFin || "-"}</p>
      <img src="http://localhost:3000/uploads/${p.comprobante}">
      <br>
      ${
        p.estado === "pendiente"
        ? `<button class="confirmar" onclick="confirmar(${p.id})">Confirmar Pago</button>`
        : ""
      }
    `;

    contenedor.appendChild(div);
  });
}

async function confirmar(id) {
  await fetch(`http://localhost:3000/confirmar/${id}`, {
    method: "POST"
  });

  alert("Pago confirmado");
  cargarPedidos();
}

cargarPedidos();
setInterval(cargarPedidos, 5000);
</script>

</body>
</html>
